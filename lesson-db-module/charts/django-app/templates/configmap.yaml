# ConfigMap holding the application environment variables (transferred from
# theme 4). It is injected into the container with `envFrom` in the Deployment.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "django-app.configMapName" . }}
  labels:
    {{- include "django-app.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.config }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
